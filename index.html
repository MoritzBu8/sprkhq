<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPRK - Eat, Watch, Drive</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Orbitron', monospace; background: #1a1a1a; color: white; overflow-x: hidden; }
        header { position: fixed; top: 0; left: 0; width: 100%; background: rgba(26,26,26,0.98); z-index: 1000; padding: 1.2rem 3rem; backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: space-between; box-shadow: 0 5px 25px rgba(0,0,0,0.6); }
        .logo { height: 65px; width: auto; border-radius: 8px; filter: drop-shadow(0 4px 12px rgba(255,255,255,0.1)); }
        nav ul { list-style: none; display: flex; gap: 3rem; }
        nav a { color: #f4a261; text-decoration: none; font-weight: 700; font-size: 1.2rem; transition: all 0.3s; letter-spacing: 1px; }
        nav a:hover { color: white; text-shadow: 0 0 12px #f4a261; }
        section { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; scroll-snap-align: start; scroll-snap-stop: always; padding-top: 90px; }
        #home { position: relative; height: 100vh; overflow: hidden; }
        .hero-container { width: 95vw; max-width: 1400px; height: 75vh; margin: 0 auto; border-radius: 20px; overflow: hidden; box-shadow: 0 25px 80px rgba(0,0,0,0.8); border: 3px solid rgba(244,162,97,0.15); position: relative; }
        .hero-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://user-gen-media-assets.s3.amazonaws.com/seedream_images/22172962-3b4e-4a38-b828-1689dcc75a49.png'); background-size: cover; background-position: center; filter: brightness(0.7) contrast(1.2); transition: transform 0.1s ease-out; }
        .hero-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 3; text-shadow: 0 4px 20px rgba(0,0,0,1); padding: 2rem; }
        .hero-tagline { font-size: 1.4rem; color: #f4a261; margin: 1rem 0; font-weight: 400; letter-spacing: 3px; }
        .hero-subtitle { font-size: 1.8rem; color: white; font-weight: 700; letter-spacing: 2px; opacity: 0.95; }
        #about { background: linear-gradient(135deg, #1a1a1a, #2a2a2a); padding: 8rem 4rem 4rem; min-height: 100vh; }
        #about h2, #contact h2 { font-size: 3.2rem; font-weight: 900; color: #f4a261; margin-bottom: 3rem; letter-spacing: 4px; text-transform: uppercase; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        #about p { max-width: 900px; margin: 0 auto 2.5rem; font-size: 1.3rem; line-height: 1.9; font-weight: 400; }
        #contact { background: #111; padding: 8rem 4rem 4rem; min-height: 100vh; }
        form { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 2rem; }
        input, textarea, button { padding: 1.4rem; border: 2px solid rgba(244,162,97,0.25); border-radius: 15px; background: #222; color: white; font-family: 'Orbitron', monospace; font-size: 1.15rem; font-weight: 400; transition: all 0.4s; }
        input:focus, textarea:focus { outline: none; border-color: #f4a261; box-shadow: 0 0 25px rgba(244,162,97,0.35); }
        button { background: linear-gradient(45deg, #f4a261, #e76f51); color: #111; font-weight: 900; cursor: pointer; border: none; letter-spacing: 2px; text-transform: uppercase; font-size: 1.2rem; }
        button:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(244,162,97,0.6); }
        @media (max-width: 768px) { header { padding: 1rem 1.5rem; } .logo { height: 50px; } nav ul { gap: 2rem; font-size: 1.1rem; } .hero-container { width: 98vw; height: 65vh; border-radius: 16px; } #about h2, #contact h2 { font-size: 2.5rem; } .hero-subtitle { font-size: 1.5rem; } }
    </style>
</head>
<body>
    <header>
        <img src="https://user-gen-media-assets.s3.amazonaws.com/seedream_images/acceef8d-5e2a-4195-941a-4c3397f11d32.png" alt="SPRK Logo" class="logo">
