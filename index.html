<!DOCTYPE html>
<html lang="en">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Orbitron', monospace; background: #1a1a1a; color: white; overflow-x: hidden; }
        header { position: fixed; top: 0; left: 0; width: 100%; background: rgba(26,26,26,0.95); z-index: 1000; padding: 1rem 2rem; backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .logo { height: 50px; width: auto; border-radius: 12px; box-shadow: 0 4px 15px rgba(244,162,97,0.3); }
        nav ul { list-style: none; display: flex; gap: 2.5rem; }
        nav a { color: #f4a261; text-decoration: none; font-weight: 700; font-size: 1.1rem; transition: all 0.3s; }
        nav a:hover { color: white; text-shadow: 0 0 10px #f4a261; }
        section { height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; scroll-snap-align: start; scroll-snap-stop: always; padding-top: 80px; }
        #home { position: relative; overflow: hidden; }
        .hero-container { max-width: 90%; max-height: 70vh; margin: 0 auto; border-radius: 24px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.7); border: 2px solid rgba(244,162,97,0.2); }
        .hero-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://user-gen-media-assets.s3.amazonaws.com/seedream_images/22172962-3b4e-4a38-b828-1689dcc75a49.png'); background-size: cover; background-position: center; filter: brightness(0.75) contrast(1.15); }
        .parallax { position: absolute; top: 0; left: 0; width: 100%; height: 100%; will-change: transform; }
        .hero-content { position: relative; z-index: 3; padding: 3rem; text-shadow: 0 3px 15px rgba(0,0,0,0.9); }
        .tagline { font-size: 1.6rem; color: #f4a261; margin-top: 1rem; font-weight: 400; letter-spacing: 2px; }
        #about { background: linear-gradient(135deg, #1a1a1a, #2a2a2a); padding: 6rem 3rem; }
        #about h2, #contact h2 { font-size: 3rem; font-weight: 900; color: #f4a261; margin-bottom: 2.5rem; letter-spacing: 3px; text-transform: uppercase; }
        #about p { max-width: 850px; margin: 0 auto 2rem; font-size: 1.25rem; line-height: 1.8; font-weight: 400; }
        #contact { background: #111; padding: 6rem 3rem; }
        form { max-width: 550px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.8rem; }
        input, textarea, button { padding: 1.2rem; border: 2px solid rgba(244,162,97,0.3); border-radius: 12px; background: #222; color: white; font-family: 'Orbitron', monospace; font-size: 1.1rem; font-weight: 400; transition: all 0.4s; }
        input:focus, textarea:focus { outline: none; border-color: #f4a261; box-shadow: 0 0 20px rgba(244,162,97,0.4); }
        button { background: linear-gradient(45deg, #f4a261, #e76f51); color: #1a1a1a; font-weight: 900; cursor: pointer; border: none; letter-spacing: 1px; text-transform: uppercase; }
        button:hover { transform: translateY(-4px); box-shadow: 0 10px 30px rgba(244,162,97,0.5); }
        @media (max-width: 768px) { header { padding: 1rem; } nav ul { gap: 1.5rem; font-size: 1rem; } .logo { height: 40px; } .hero-container { max-height: 60vh; border-radius: 16px; } #about h2, #contact h2 { font-size: 2.2rem; } }
    </style>
</head>
